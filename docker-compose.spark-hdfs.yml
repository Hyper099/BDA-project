version: "3.9"

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: fi-hdfs-namenode
    environment:
      - CLUSTER_NAME=fi-hadoop
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./data:/workspace-data

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: fi-hdfs-datanode
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    depends_on:
      - namenode

  spark:
    image: apache/spark:3.5.1
    container_name: fi-spark
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./:/app
    working_dir: /app
    command:
      [
        "bash",
        "-lc",
        "/opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host 0.0.0.0 --port 7077 --webui-port 8080",
      ]
    depends_on:
      - namenode
      - datanode

  spark-worker:
    image: apache/spark:3.5.1
    container_name: fi-spark-worker
    ports:
      - "8081:8081"
    command:
      [
        "bash",
        "-lc",
        "/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://fi-spark:7077 --webui-port 8081",
      ]
    depends_on:
      - spark

volumes:
  hadoop_namenode:
  hadoop_datanode:
