services:
  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: financial-inclusion-spark:3.5.3
    container_name: financial-inclusion-spark
    working_dir: /app
    volumes:
      - ./:/app
    command:
      [
        "bash",
        "-lc",
        "python3 -m data.pyspark_pipeline --input data/raw/financial_inclusion_data.csv --output data/processed/financial_inclusion_features.csv",
      ]
